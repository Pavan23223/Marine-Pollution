<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OceanGuardian AI Chat</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #0a192f, #020c1b);
        color: white;
        display: flex;
        flex-direction: column;
        height: 100vh;
    }

    /* HEADER */
    .header {
        padding: 15px 25px;
        background: rgba(17, 34, 64, 0.8);
        border-bottom: 1px solid rgba(255,255,255,0.1);
        font-size: 20px;
        font-weight: 600;
        color: #64ffda;
    }

    /* CHAT AREA */
    .chat-container {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
    }

    /* MESSAGE */
    .message {
        max-width: 70%;
        padding: 12px 15px;
        border-radius: 12px;
        margin: 10px 0;
        line-height: 1.5;
        font-size: 14px;
    }

    /* USER */
    .user {
        align-self: flex-end;
        background: #64ffda;
        color: black;
    }

    /* AI */
    .ai {
        align-self: flex-start;
        background: rgba(255,255,255,0.1);
    }

    /* INPUT AREA */
    .input-container {
        display: flex;
        padding: 15px;
        background: rgba(17, 34, 64, 0.9);
        border-top: 1px solid rgba(255,255,255,0.1);
    }

    .input-container input {
        flex: 1;
        padding: 12px;
        border-radius: 8px;
        border: none;
        outline: none;
        font-size: 14px;
    }

    .input-container button {
        margin-left: 10px;
        padding: 12px 20px;
        border: none;
        border-radius: 8px;
        background: #64ffda;
        font-weight: bold;
        cursor: pointer;
    }

    .input-container button:hover {
        background: #52e0c4;
    }

    /* SCROLL BAR */
    .chat-container::-webkit-scrollbar {
        width: 6px;
    }

    .chat-container::-webkit-scrollbar-thumb {
        background: #64ffda;
        border-radius: 10px;
    }
    .message.ai {
    white-space: pre-line;
}
  </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  OceanGuardian AI
</div>

<!-- CHAT -->
<div id="chatContainer" class="chat-container"></div>

<!-- INPUT -->
<div class="input-container">
  <input type="text" id="userInput" placeholder="Ask about marine pollution...">
  <button onclick="sendMessage()">Send</button>
</div>

<script>

  window.onload = function () {
    const chat = document.getElementById("chatContainer");

    const welcomeMessage = `
        <div class="message ai">
        Hello! I’m your <b>OceanGuardian AI 🌊</b><br><br>
        I can help you with:
        <br>• Fishing safety 
        <br>• Marine pollution 
        <br>• Safe zones & risk areas ⚠️<br><br>
        Ask me anything!
        </div>
    `;

    chat.innerHTML += welcomeMessage;
}

async function sendMessage() {

    const input = document.getElementById("userInput");
    const chat = document.getElementById("chatContainer");

    const message = input.value.trim();
    if (!message) return;

    // USER MESSAGE
    chat.innerHTML += `<div class="message user">${message}</div>`;
    chat.scrollTop = chat.scrollHeight;

    input.value = "";

    // LOADING
    const loading = document.createElement("div");
    loading.className = "message ai";
    loading.innerText = "Thinking...";
    chat.appendChild(loading);
    chat.scrollTop = chat.scrollHeight;

    try {
        const res = await fetch("http://127.0.0.1:8001/chat", {   
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ user_input: message })   
        });

        const data = await res.json();

        loading.remove();

        const formattedText = (data.response || data.error)
          .replace(/\n/g, "<br>")
          .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")   // bold
          .replace(/\* (.*?)<br>/g, "• $1<br>");    // bullets

    chat.innerHTML += `<div class="message ai">${formattedText}</div>`;
   
        chat.scrollTop = chat.scrollHeight;

    } catch (err) {
        loading.innerText = " Server error";
    }
}
</script>

</body>
</html>
