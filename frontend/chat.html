<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OceanGuardian AI Chat</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #0a192f, #020c1b);
        color: white;
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
    }

    /* ── CHAT AREA ── */
    .chat-container {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    /* ── MESSAGE BUBBLE ── */
    .message {
        max-width: 78%;
        padding: 13px 16px;
        border-radius: 16px;
        margin: 4px 0;
        line-height: 1.6;
        font-size: 15px;
        word-break: break-word;
    }

    .user {
        align-self: flex-end;
        background: #64ffda;
        color: #0a192f;
        border-bottom-right-radius: 4px;
        font-weight: 500;
    }

    .ai {
        align-self: flex-start;
        background: rgba(255,255,255,0.12);
        border-bottom-left-radius: 4px;
        white-space: pre-line;
    }

    /* ── INPUT BAR ── */
    .input-container {
        display: flex;
        align-items: center;
        padding: 12px 14px;
        background: rgba(17, 34, 64, 0.95);
        border-top: 1px solid rgba(255,255,255,0.1);
        flex-shrink: 0;
        gap: 10px;
    }

    .input-container input {
        flex: 1;
        padding: 13px 16px;
        border-radius: 24px;
        border: 1.5px solid rgba(100,255,218,0.3);
        outline: none;
        background: rgba(255,255,255,0.07);
        color: white;
        font-family: 'Poppins', sans-serif;
        font-size: 15px;
        min-width: 0;
        transition: border 0.2s;
    }

    .input-container input::placeholder { color: rgba(255,255,255,0.4); }
    .input-container input:focus { border-color: #64ffda; }

    .input-container button {
        margin: 0;
        padding: 13px 22px;
        border: none;
        border-radius: 24px;
        background: #64ffda;
        color: #0a192f;
        font-family: 'Poppins', sans-serif;
        font-weight: 700;
        font-size: 15px;
        cursor: pointer;
        white-space: nowrap;
        touch-action: manipulation;
        flex-shrink: 0;
        transition: background 0.2s, transform 0.15s;
        width: auto;
    }

    .input-container button:hover { background: #52e0c4; transform: scale(1.04); }

    /* ── SCROLLBAR ── */
    .chat-container::-webkit-scrollbar { width: 5px; }
    .chat-container::-webkit-scrollbar-thumb { background: #64ffda55; border-radius: 10px; }

    /* ── MOBILE (≤ 600px) ── */
    @media (max-width: 600px) {

        .header {
            font-size: 17px;
            padding: 13px 14px;
        }

        .chat-container { padding: 10px 10px; }

        /* Bigger bubbles on mobile for readability */
        .message {
            max-width: 92%;
            font-size: 15px;   /* keep 15px — NOT smaller */
            padding: 12px 14px;
            line-height: 1.65;
        }

        .input-container {
            padding: 10px 10px;
            gap: 8px;
        }

        .input-container input {
            font-size: 16px;   /* 16px prevents iOS auto-zoom */
            padding: 12px 14px;
        }

        .input-container button {
            font-size: 15px;
            padding: 12px 16px;
        }
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div style="display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(17,34,64,0.92);border-bottom:1px solid rgba(100,255,218,0.2);flex-shrink:0;">
  <a href="index.html" style="display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;min-width:40px;background:rgba(100,255,218,0.15);border:2px solid #64ffda;border-radius:10px;color:#64ffda;font-size:22px;font-weight:bold;text-decoration:none;line-height:1;">&#8592;</a>
  <span style="font-size:18px;font-weight:600;color:#64ffda;">🌊 OceanGuardian AI</span>
</div>

<!-- CHAT -->
<div id="chatContainer" class="chat-container"></div>

<!-- INPUT -->
<div class="input-container">
  <input type="text" id="userInput" placeholder="Ask about marine pollution..."
         onkeydown="if(event.key==='Enter') sendMessage()">
  <button onclick="sendMessage()">Send</button>
</div>

<script>

  window.onload = function () {
    const chat = document.getElementById("chatContainer");

    const welcomeMessage = `
        <div class="message ai">
        Hello! I’m your <b>OceanGuardian AI 🌊</b><br><br>
        I can help you with:
        <br>• Fishing safety 
        <br>• Marine pollution 
        <br>• Safe zones & risk areas ⚠️<br><br>
        Ask me anything!
        </div>
    `;

    chat.innerHTML += welcomeMessage;
}

async function sendMessage() {

    const input = document.getElementById("userInput");
    const chat = document.getElementById("chatContainer");

    const message = input.value.trim();
    if (!message) return;

    // USER MESSAGE
    chat.innerHTML += `<div class="message user">${message}</div>`;
    chat.scrollTop = chat.scrollHeight;

    input.value = "";

    // LOADING
    const loading = document.createElement("div");
    loading.className = "message ai";
    loading.innerText = "Thinking...";
    chat.appendChild(loading);
    chat.scrollTop = chat.scrollHeight;

    try {
        const res = await fetch("http://127.0.0.1:8001/chat", {   
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ user_input: message })   
        });

        const data = await res.json();

        loading.remove();

        const formattedText = (data.response || data.error)
          .replace(/\n/g, "<br>")
          .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")   // bold
          .replace(/\* (.*?)<br>/g, "• $1<br>");    // bullets

    chat.innerHTML += `<div class="message ai">${formattedText}</div>`;
   
        chat.scrollTop = chat.scrollHeight;

    } catch (err) {
        loading.innerText = " Server error";
    }
}
</script>

</body>
</html>
