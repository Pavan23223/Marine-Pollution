<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Folder Upload | OceanGuardian AI</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>

<!-- HEADER -->
<div class="hero small">
  <h1><i class="fas fa-water"></i> OceanGuardian AI</h1>
  <p>Analyze Multiple Images (Folder Upload)</p>
</div>

<!-- MAIN -->
<div class="upload-container">

  <div class="upload-card">

    <h2><i class="fas fa-folder-open"></i> Upload Folder</h2>

    <label class="upload-box">
      <input type="file" id="folderInput" webkitdirectory multiple>
      <span><i class="fas fa-cloud-upload-alt"></i> Select Folder</span>
    </label>

    <div id="result" class="result-box">Waiting...</div>

  </div>

</div>

<!-- IMAGE GRID -->
<div id="imageViewer" class="image-grid"></div>

<!-- MAP -->
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>


</body>
</html>
