<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Single Upload | OceanGuardian AI</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>

<!-- BACK BUTTON -->
<div style="display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(17,34,64,0.92);border-bottom:1px solid rgba(100,255,218,0.2);position:sticky;top:0;z-index:999;">
  <a href="index.html" style="display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;min-width:40px;background:rgba(100,255,218,0.15);border:2px solid #64ffda;border-radius:10px;color:#64ffda;font-size:22px;font-weight:bold;text-decoration:none;line-height:1;">&#8592;</a>
  <div style="text-align:left;line-height:1.3;">
    <div style="font-size:17px;font-weight:600;color:#64ffda;"><i class="fas fa-image"></i> Single Image</div>
    <div style="font-size:12px;opacity:0.6;">Analyze Marine Pollution</div>
  </div>
</div>

<!-- MAIN CARD -->
<div class="upload-container">

  <div class="upload-card">

    <h2><i class="fas fa-image"></i> Upload Image</h2>

    <label class="upload-box">
      <input type="file" id="imageInput" onchange="previewImage()">
      <span><i class="fas fa-cloud-upload-alt"></i> Click to Upload</span>
    </label>

    <img id="preview">

    <button onclick="uploadImage()">
      <i class="fas fa-magnifying-glass"></i> Analyze
    </button>

    <div id="result" class="result-box">
      No data yet
    </div>

  </div>

</div>

<!-- MAP -->
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
