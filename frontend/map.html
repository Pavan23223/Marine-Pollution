<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Map | OceanGuardian AI</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>

<!-- BACK BUTTON -->
<div style="display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(17,34,64,0.92);border-bottom:1px solid rgba(100,255,218,0.2);position:sticky;top:0;z-index:999;">
  <a href="index.html" style="display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;min-width:40px;background:rgba(100,255,218,0.15);border:2px solid #64ffda;border-radius:10px;color:#64ffda;font-size:22px;font-weight:bold;text-decoration:none;line-height:1;">&#8592;</a>
  <div style="text-align:left;line-height:1.3;">
    <div style="font-size:17px;font-weight:600;color:#64ffda;"><i class="fas fa-map"></i> Live Map</div>
    <div style="font-size:12px;opacity:0.6;">Marine Pollution Monitoring</div>
  </div>
</div>

<!-- FILTER BUTTONS -->
<div class="filter-container">
  <button onclick="filterMarkers('ALL')">All</button>
  <button onclick="filterMarkers('HIGH')">High Pollution</button>
  <button onclick="filterMarkers('MEDIUM')">Medium</button>
  <button onclick="filterMarkers('LOW')">Clean</button>
</div>

<!-- MAP -->
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="map.js"></script>

</body>
</html>
